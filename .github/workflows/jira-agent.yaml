name: jira-agent

on:
  repository_dispatch:
    types: [jira-trigger-event]
  workflow_dispatch:
    inputs:
      jira_issue:
        description: "Jira issue key (ex: PROJ-123)"
        required: true
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read issue key
        env:
          ISSUE_KEY_RAW: ${{ github.event.client_payload.issue_key || inputs.jira_issue }}
        run: |
          if [[ ! "${ISSUE_KEY_RAW}" =~ ^[A-Z]+-[0-9]+$ ]]; then
            echo "Invalid issue key: ${ISSUE_KEY_RAW}" >&2
            exit 1
          fi
          echo "ISSUE_KEY=${ISSUE_KEY_RAW}" >> "$GITHUB_ENV"

      - name: Build prompt
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          delimiter="EOF_$(openssl rand -hex 16)"
          {
            echo "AGENT_PROMPT<<${delimiter}"
            scripts/jira-fetch "${ISSUE_KEY}"
            echo "${delimiter}"
          } >> "$GITHUB_ENV"

      - name: Implement with Claude
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          prompt: ${{ env.AGENT_PROMPT }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Enumerating tools is impractical — the agent uses composites
          # (`command -v uv`, `bash -lc '...'`, `make ...`) that the prompt
          # gate refuses. The real boundary lives at the workflow level:
          # ephemeral GitHub-hosted runner, `permissions:` scoped to write
          # for contents/PR/id-token only, OAuth token scoped to this repo,
          # and the agent's output is a PR (not a merge to main). Tool
          # gating inside Claude on top of that is friction without value.
          # See SEC-007.
          claude_args: >-
            --model claude-opus-4-8
            --dangerously-skip-permissions
          show_full_output: true

      - name: Ensure PR and capture URL
        id: pr
        env:
          GH_TOKEN: ${{ steps.claude.outputs.github_token }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          # The action's `branch_name` output is empty in `prompt` mode; Claude
          # is instructed in the prompt (see scripts/jira-fetch) to push a
          # branch named `claude/<ISSUE_KEY>`, so we hard-code it here.
          BRANCH_NAME: claude/${{ env.ISSUE_KEY }}
        run: |
          pr_url="$(scripts/ensure-pr "${BRANCH_NAME}" "${ISSUE_KEY}")"
          echo "url=${pr_url}" >> "$GITHUB_OUTPUT"

      - name: Comment + transition on Jira
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          PR_URL: ${{ steps.pr.outputs.url }}
        run: |
          scripts/jira-comment "${ISSUE_KEY}" "Agent opened a PR: ${PR_URL}"
          scripts/jira-transition "${ISSUE_KEY}" "In Review"

      - name: Collect Claude execution log
        if: always()
        env:
          ISSUE_KEY: ${{ env.ISSUE_KEY }}
        run: |
          log_dir="$(mktemp --directory)"
          src="/home/runner/work/_temp/claude-execution-output.json"
          if [[ -f "${src}" ]]; then
            cp "${src}" "${log_dir}/claude-execution-output.json"
          else
            echo "claude-execution-output.json not produced" \
              > "${log_dir}/MISSING.txt"
          fi
          tar --create --gzip \
            --file "claude-execution-log-${ISSUE_KEY}.tar.gz" \
            --directory "${log_dir}" \
            .

      - name: Upload Claude execution log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-execution-log-${{ env.ISSUE_KEY }}
          path: claude-execution-log-${{ env.ISSUE_KEY }}.tar.gz
          retention-days: 30
