name: jira-agent

on:
  repository_dispatch:
    types: [jira-trigger-event]
  workflow_dispatch:
    inputs:
      jira_issue:
        description: "Jira issue key (ex: PROJ-123)"
        required: true
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read issue key
        env:
          ISSUE_KEY_RAW: ${{ github.event.client_payload.issue_key || inputs.jira_issue }}
        run: |
          if [[ ! "${ISSUE_KEY_RAW}" =~ ^[A-Z]+-[0-9]+$ ]]; then
            echo "Invalid issue key: ${ISSUE_KEY_RAW}" >&2
            exit 1
          fi
          echo "ISSUE_KEY=${ISSUE_KEY_RAW}" >> "$GITHUB_ENV"

      - name: Build prompt
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          delimiter="EOF_$(openssl rand -hex 16)"
          {
            echo "AGENT_PROMPT<<${delimiter}"
            scripts/jira-fetch "${ISSUE_KEY}"
            echo "${delimiter}"
          } >> "$GITHUB_ENV"

      - name: Implement with Claude
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          prompt: ${{ env.AGENT_PROMPT }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Allow git/gh so Claude can branch+commit+push, plus the file edit
          # tools it needs to satisfy the issue. Output is unhidden so the
          # next run is debuggable; trim later once stable.
          claude_args: >-
            --model claude-opus-4-8
            --allowed-tools "Bash(git:*),Bash(gh:*),Read,Write,Edit,Glob,Grep"
          show_full_output: true

      - name: Ensure PR and capture URL
        id: pr
        env:
          GH_TOKEN: ${{ steps.claude.outputs.github_token }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          # The action's `branch_name` output is empty in `prompt` mode; Claude
          # is instructed in the prompt (see scripts/jira-fetch) to push a
          # branch named `claude/<ISSUE_KEY>`, so we hard-code it here.
          BRANCH_NAME: claude/${{ env.ISSUE_KEY }}
        run: |
          pr_url="$(scripts/ensure-pr "${BRANCH_NAME}" "${ISSUE_KEY}")"
          echo "url=${pr_url}" >> "$GITHUB_OUTPUT"

      - name: Comment + transition on Jira
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          PR_URL: ${{ steps.pr.outputs.url }}
        run: |
          scripts/jira-comment "${ISSUE_KEY}" "Agent opened a PR: ${PR_URL}"
          scripts/jira-transition "${ISSUE_KEY}" "In Review"
