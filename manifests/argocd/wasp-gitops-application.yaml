---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wasp-gitops
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/smsilva/wasp-gitops.git
    path: infrastructure/tenants
    targetRevision: dev
    directory:
      recurse: true

  destination:
    namespace: infra
    name: in-cluster

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      enabled: true
    syncOptions:
      - Validate=false
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true