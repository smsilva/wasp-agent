[project]
name = "wasp-agent"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "agno>=2.0.0",
    "python-dotenv>=1.0.0",
    "sqlalchemy>=2.0.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
    "ruff>=0.4.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.coverage.run]
omit = ["tests/*"]

[tool.coverage.report]
fail_under = 100
exclude_lines = [
    "if __name__ == .__main__.:",
]
